<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BridgeFlow 控制台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .header .version { font-size: 12px; color: #64748b; background: #1e2433;
                     padding: 2px 8px; border-radius: 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 900px; }
  @media(max-width:640px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase;
             letter-spacing: .05em; margin-bottom: 16px; }
  .env-row { display: flex; align-items: center; gap: 10px; padding: 8px 0;
             border-bottom: 1px solid #1e2433; }
  .env-row:last-child { border-bottom: none; }
  .env-label { flex: 1; font-size: 14px; color: #cbd5e1; }
  .env-value { font-size: 13px; color: #94a3b8; max-width: 220px; overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
           border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge.ok  { background: #14532d; color: #4ade80; }
  .badge.warn{ background: #713f12; color: #fbbf24; }
  .badge.err { background: #450a0a; color: #f87171; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot.red   { background: #f87171; box-shadow: 0 0 6px #f87171; }
  .dot.yellow{ background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
  .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #qrCanvas { border-radius: 8px; background: #fff; padding: 10px; }
  .machine-code { font-family: monospace; font-size: 18px; font-weight: 700;
                  color: #38bdf8; letter-spacing: .1em; }
  .hint { font-size: 12px; color: #64748b; text-align: center; line-height: 1.6; }
  .status-big { font-size: 28px; font-weight: 800; margin: 8px 0; }
  .status-big.connected { color: #4ade80; }
  .status-big.disconnected { color: #f87171; }
  .relay-url { font-size: 12px; color: #64748b; word-break: break-all; margin-top: 4px; }
  .warn-box { background: #422006; border: 1px solid #92400e; border-radius: 8px;
              padding: 12px 16px; margin-top: 12px; font-size: 13px; color: #fbbf24;
              line-height: 1.6; }
  .warn-box a { color: #38bdf8; }
  .full-width { grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="header">
  <div class="dot green" id="connDot" style="width:12px;height:12px"></div>
  <h1>BridgeFlow 控制台</h1>
  <span class="version">PC 执行机</span>
</div>

<div class="grid">

  <!-- 环境检测 -->
  <div class="card">
    <h2>环境检测</h2>
    <div class="env-row">
      <span class="env-label">操作系统</span>
      <span class="env-value" id="envOs">-</span>
    </div>
    <div class="env-row">
      <span class="env-label">Python 版本</span>
      <span id="envPy">-</span>
    </div>
    <div class="env-row">
      <span class="env-label">Cursor IDE</span>
      <span id="envCursor">-</span>
    </div>
    <div id="cursorWarn" class="warn-box" style="display:none">
      ⚠️ 未检测到 Cursor，请先安装：<br>
      <a href="https://cursor.com" target="_blank">https://cursor.com</a>
    </div>
  </div>

  <!-- 连接状态 -->
  <div class="card">
    <h2>连接状态</h2>
    <div class="status-big disconnected" id="connStatus">未连接</div>
    <div class="relay-url" id="relayUrl">-</div>
    <div class="env-row" style="margin-top:12px">
      <span class="env-label">设备 ID</span>
      <span class="env-value" id="deviceId">-</span>
    </div>
    <div class="env-row">
      <span class="env-label">房间号</span>
      <span class="env-value" id="roomKey">-</span>
    </div>
    <div class="env-row">
      <span class="env-label">绑定状态</span>
      <span id="bindStatus">-</span>
    </div>
  </div>

  <!-- 扫码绑定 -->
  <div class="card qr-wrap">
    <h2>手机扫码绑定</h2>
    <img id="qrImg" src="/api/qr" width="160" height="160"
         style="border-radius:8px;background:#fff;padding:8px;"
         alt="二维码加载中…">
    <div class="machine-code" id="machineCode">-</div>
    <div class="hint">
      打开手机端 PWA，点击「绑定 PC」<br>
      扫描上方二维码或输入机器码完成配对
    </div>
  </div>

  <!-- 任务统计 -->
  <div class="card">
    <h2>任务统计</h2>
    <div class="env-row">
      <span class="env-label">今日任务</span>
      <span class="env-value" id="taskCount">-</span>
    </div>
    <div class="env-row">
      <span class="env-label">今日回复</span>
      <span class="env-value" id="replyCount">-</span>
    </div>
    <div class="env-row">
      <span class="env-label">设备名称</span>
      <span class="env-value" id="deviceName">-</span>
    </div>
  </div>

</div>

<script>
function badge(ok, yesText, noText) {
  if (ok) return `<span class="badge ok">✓ ${yesText}</span>`;
  return `<span class="badge err">✗ ${noText}</span>`;
}


async function refresh() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    // 操作系统
    const osMap = { Windows: 'Windows', Darwin: 'macOS', Linux: 'Linux' };
    document.getElementById('envOs').textContent =
      (osMap[d.env?.os_name] || d.env?.os_name || '-') + '  ' + (d.env?.os_version || '');

    // Python
    const pyOk = d.env?.python_ok;
    document.getElementById('envPy').innerHTML =
      badge(pyOk, d.env?.python_version || '>=3.10', d.env?.python_version + ' (需要 ≥3.10)');

    // Cursor
    const cursorOk = d.env?.cursor_installed;
    document.getElementById('envCursor').innerHTML =
      badge(cursorOk, d.env?.cursor_running ? '运行中' : '已安装', '未安装');
    document.getElementById('cursorWarn').style.display = cursorOk ? 'none' : 'block';

    // 连接状态
    const connected = d.relay_connected;
    const connEl = document.getElementById('connStatus');
    connEl.textContent = connected ? '已连接' : '连接中…';
    connEl.className = 'status-big ' + (connected ? 'connected' : 'disconnected');
    document.getElementById('connDot').className =
      'dot ' + (connected ? 'green' : 'yellow');
    document.getElementById('relayUrl').textContent = d.relay_url || '-';
    document.getElementById('deviceId').textContent = d.device_id || '-';
    document.getElementById('roomKey').textContent = d.room_key || '-';

    // 绑定状态
    const bindMap = { unbound: '未绑定', bound: '已绑定', pending: '等待确认' };
    const bindOk = d.bind_status === 'bound';
    document.getElementById('bindStatus').innerHTML =
      badge(bindOk, '已绑定', bindMap[d.bind_status] || d.bind_status);

    // 机器码
    const mc = d.machine_code || '';
    document.getElementById('machineCode').textContent = mc;
    // 二维码由服务端生成，刷新时重载图片
    const qrImg = document.getElementById('qrImg');
    qrImg.src = '/api/qr?t=' + Date.now();

    // 统计
    document.getElementById('taskCount').textContent = d.task_count ?? '-';
    document.getElementById('replyCount').textContent = d.reply_count ?? '-';
    document.getElementById('deviceName').textContent = d.device_name || '-';

  } catch(e) {
    document.getElementById('connStatus').textContent = '服务启动中…';
  }
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
